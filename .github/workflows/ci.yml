name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:

  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          REDIS_URL: redis://localhost:6379
          # Dummy values — unit tests mock all external calls
          TWILIO_ACCOUNT_SID: ACtest
          TWILIO_AUTH_TOKEN: test
          TWILIO_PHONE_NUMBER: "+10000000000"
          DEEPGRAM_API_KEY: test
          GROQ_API_KEY: test
          ELEVENLABS_API_KEY: test
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_KEY: test
          PUBLIC_URL: http://localhost:5000
          DEFAULT_CLINIC_ID: test-clinic
        run: pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-clinic-voice:latest .

      - name: Verify container starts
        run: |
          docker run -d \
            -e TWILIO_ACCOUNT_SID=ACtest \
            -e TWILIO_AUTH_TOKEN=test \
            -e TWILIO_PHONE_NUMBER="+10000000000" \
            -e DEEPGRAM_API_KEY=test \
            -e GROQ_API_KEY=test \
            -e ELEVENLABS_API_KEY=test \
            -e SUPABASE_URL=https://test.supabase.co \
            -e SUPABASE_KEY=test \
            -e PUBLIC_URL=http://localhost:5000 \
            -e DEFAULT_CLINIC_ID=test \
            -e REDIS_URL=redis://localhost:6379 \
            -p 5000:5000 \
            --name clinic-voice \
            ai-clinic-voice:latest || true
          sleep 5
          docker logs clinic-voice